<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeifAI</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='8' y='8' width='16' height='16' transform='rotate(45 16 16)' fill='%23000099'/%3E%3C/svg%3E">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Sohne",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#EBEBFA;min-height:100vh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}
.inner{text-align:center;padding:24px}
.mark{width:min(280px,56vw);height:min(280px,56vw);margin:0 auto}
.mark svg{display:block;width:100%;height:100%;fill:#000099}

/* breathing animation — slowed from 3.6s to 5.4s */
.mark rect{animation:node 5.4s ease-in-out infinite}
/* snake: TL > TM > TR > MR > MC > ML > BL > BM > BR */
.mark rect:nth-child(1){animation-delay:0s}
.mark rect:nth-child(2){animation-delay:.6s}
.mark rect:nth-child(3){animation-delay:1.2s}
.mark rect:nth-child(6){animation-delay:1.8s}
.mark rect:nth-child(5){animation-delay:2.4s}
.mark rect:nth-child(4){animation-delay:3.0s}
.mark rect:nth-child(7){animation-delay:3.6s}
.mark rect:nth-child(8){animation-delay:4.2s}
.mark rect:nth-child(9){animation-delay:4.8s}
.mark rect:nth-child(n+10){animation:none;opacity:1}
@keyframes node{0%,20%,100%{opacity:1}10%{opacity:.25}}

/* gate: holds either the access button or the credentials form */
.gate{margin-top:64px;min-height:2.6em;display:flex;align-items:center;justify-content:center}

/* shared muted-uppercase typographic style, same font as the page */
.enter,.cred input,.cred button{
  font-family:inherit;font-weight:700;font-size:clamp(.95rem,2.4vw,1.35rem);
  letter-spacing:.18em;text-transform:uppercase;
}

.enter{
  background:none;border:0;cursor:pointer;color:#8A8F9C;
  padding:6px 4px;transition:color .35s ease;
  animation:breathe 5.4s ease-in-out infinite;
}
.enter:hover,.enter:focus-visible{color:#000099;animation-play-state:paused;outline:none}
@keyframes breathe{0%,100%{opacity:1}50%{opacity:.45}}

/* credentials form, hidden until the button is pressed */
.cred{display:none;flex-direction:column;align-items:center;gap:18px;width:min(360px,82vw)}
.cred.show{display:flex;animation:rise .4s ease both}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.cred input{
  width:100%;text-align:center;color:#000099;background:transparent;
  border:0;border-bottom:1.5px solid #C3C3E6;padding:10px 6px;
  font-size:.95rem;letter-spacing:.12em;text-transform:none;
  transition:border-color .25s ease;
}
.cred input::placeholder{color:#8A8F9C;text-transform:uppercase;letter-spacing:.18em;font-weight:700;font-size:.8rem}
.cred input:focus{outline:none;border-bottom-color:#000099}
.cred button{
  margin-top:6px;cursor:pointer;color:#EBEBFA;background:#000099;border:0;
  padding:12px 28px;border-radius:999px;font-size:.85rem;
  transition:opacity .25s ease,transform .25s ease;
}
.cred button:hover,.cred button:focus-visible{opacity:.86;outline:none}
.cred button:active{transform:translateY(1px)}
.cred button:disabled{opacity:.55;cursor:default}
.err{min-height:1.2em;color:#9A2A2A;font-size:.78rem;letter-spacing:.14em;text-transform:uppercase;font-weight:700;opacity:0;transition:opacity .2s ease}
.err.show{opacity:1}
.cred.shake{animation:shake .4s ease}
@keyframes shake{10%,90%{transform:translateX(-2px)}30%,70%{transform:translateX(4px)}50%{transform:translateX(-4px)}}

@media(prefers-reduced-motion:reduce){.mark rect,.enter,.cred,.cred.shake,.gate.shake{animation:none}}
</style>
</head>
<body>
  <div class="inner">
    <div class="mark" aria-hidden="true">
      <svg viewBox="0 0 553.74 553.74"><g>
        <rect x="18.54" y="18.54" width="89.53" height="89.53" transform="translate(63.31 -26.22) rotate(45)"/>
        <rect x="232.1" y="18.54" width="89.53" height="89.53" transform="translate(125.86 -177.23) rotate(45)"/>
        <rect x="445.66" y="18.54" width="89.53" height="89.53" transform="translate(188.41 -328.24) rotate(45)"/>
        <rect x="18.54" y="232.1" width="89.53" height="89.53" transform="translate(214.32 36.33) rotate(45)"/>
        <rect x="232.1" y="232.1" width="89.53" height="89.53" transform="translate(276.87 -114.68) rotate(45)"/>
        <rect x="445.66" y="232.1" width="89.53" height="89.53" transform="translate(339.42 -265.69) rotate(45)"/>
        <rect x="18.54" y="445.66" width="89.53" height="89.53" transform="translate(365.33 98.88) rotate(45)"/>
        <rect x="232.1" y="445.66" width="89.53" height="89.53" transform="translate(427.88 -52.13) rotate(45)"/>
        <rect x="445.66" y="445.66" width="89.53" height="89.53" transform="translate(490.43 -203.14) rotate(45)"/>
        <rect x="53.87" y="117.18" width="18.88" height="105.82"/>
        <rect x="53.87" y="330.74" width="18.88" height="105.82"/>
        <rect x="117.18" y="480.99" width="105.82" height="18.88"/>
        <rect x="330.74" y="480.99" width="105.82" height="18.88"/>
      </g></svg>
    </div>

    <div class="gate">
      <button class="enter" id="enterBtn" type="button" aria-expanded="false" aria-controls="credForm">Enter Access Credentials</button>

      <form class="cred" id="credForm" novalidate aria-label="Access credentials — press Escape to cancel">
        <input id="user" name="username" type="text" placeholder="Username" autocomplete="username" autocapitalize="none" spellcheck="false" aria-label="Username">
        <input id="pass" name="password" type="password" placeholder="Password" autocomplete="current-password" aria-label="Password">
        <button type="submit">Enter</button>
        <div class="err" id="err" role="alert" aria-live="polite"></div>
      </form>
    </div>
  </div>

<script>
(function(){
  // Server-side credential gate. The form posts to /api/login, which checks
  // credentials against Vercel environment variables and (on success) sets a
  // signed, HttpOnly cookie. Edge middleware (middleware.js) then guards
  // /site/* — the main page is unreachable without a valid cookie, even via a
  // direct URL. No password appears anywhere in this page's source.
  var REDIRECT = "site/index.html";

  var gate      = document.querySelector(".gate");
  var enterBtn  = document.getElementById("enterBtn");
  var form      = document.getElementById("credForm");
  var userIn    = document.getElementById("user");
  var passIn    = document.getElementById("pass");
  var submitBtn = form.querySelector('button[type="submit"]');
  var errBox    = document.getElementById("err");
  var busy = false;

  function openForm(){
    enterBtn.style.display = "none";
    enterBtn.setAttribute("aria-expanded","true");
    form.classList.add("show");
    userIn.focus();
  }

  function closeForm(){
    form.classList.remove("show");
    enterBtn.style.display = "";
    enterBtn.setAttribute("aria-expanded","false");
    clearError();
    enterBtn.focus();
  }

  function clearError(){ errBox.textContent = ""; errBox.classList.remove("show"); }

  function showError(msg){
    errBox.textContent = msg;
    errBox.classList.add("show");
    gate.classList.remove("shake");
    void gate.offsetWidth;          // reflow so the shake re-triggers
    gate.classList.add("shake");
    passIn.value = "";
    passIn.focus();
  }

  enterBtn.addEventListener("click", openForm);

  form.addEventListener("submit", async function(e){
    e.preventDefault();
    if (busy) return;
    var u = userIn.value.trim();
    var p = passIn.value;                 // do not trim — passwords may contain spaces
    if (!u || !p){ showError("Enter username and password"); return; }

    busy = true; submitBtn.disabled = true; submitBtn.textContent = "Checking…"; clearError();
    try {
      var resp = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username: u, password: p })
      });
      if (resp.ok){
        window.location.href = REDIRECT;   // navigate away; leave button disabled
        return;
      }
      showError(resp.status === 401 ? "Invalid credentials" : "Server error — check configuration");
    } catch (_){
      showError("Connection error — try again");
    }
    busy = false; submitBtn.disabled = false; submitBtn.textContent = "Enter";
  });

  // Escape collapses the form back to the button (only while it is open)
  document.addEventListener("keydown", function(e){
    if (e.key === "Escape" && form.classList.contains("show")) closeForm();
  });
})();
</script>
<!-- LeifAI analytics — cookieless, privacy-respecting, non-invasive. Reads only; never alters the page or the login flow. -->
<script>
(function(){
  if(navigator.doNotTrack==='1'||window.doNotTrack==='1'||navigator.msDoNotTrack==='1'||navigator.globalPrivacyControl===true) return;
  var SURFACE='splash', ENDPOINT='/api/track', queue=[];
  var engagedMs=0, lastResume=Date.now(), visible=!document.hidden;
  var curView=null, viewEngagedBase=0, maxScroll=0, lastScrollEmit=-1, scrollScheduled=false;

  function utm(){try{var p=new URLSearchParams(location.search),o={};['source','medium','campaign','term','content'].forEach(function(k){var v=p.get('utm_'+k);if(v)o[k]=v;});return o;}catch(_){return{};}}
  function push(ev){ if(ev.path===undefined)ev.path=location.pathname; if(ev.spa_view===undefined)ev.spa_view=curView; queue.push(ev); if(queue.length>=20)flush(); }
  function flush(){ if(!queue.length)return; var body=JSON.stringify({v:1,surface:SURFACE,events:queue.splice(0,queue.length)}); var ok=false; try{ if(navigator.sendBeacon) ok=navigator.sendBeacon(ENDPOINT,new Blob([body],{type:'application/json'})); }catch(_){} if(!ok){ try{ fetch(ENDPOINT,{method:'POST',body:body,headers:{'Content-Type':'application/json'},keepalive:true,credentials:'omit'}); }catch(_){} } }

  function accrue(){ if(visible){ engagedMs+=Date.now()-lastResume; lastResume=Date.now(); } }
  function emitEngage(){ accrue(); var d=engagedMs-viewEngagedBase; if(d>0){ push({type:'engage',engaged_ms:d}); viewEngagedBase=engagedMs; } }
  function emitScroll(){ if(maxScroll>lastScrollEmit){ push({type:'scroll',scroll_pct:maxScroll}); lastScrollEmit=maxScroll; } }
  function scrollPct(){ var h=document.documentElement,b=document.body; var sh=Math.max(h.scrollHeight,b.scrollHeight)-window.innerHeight; if(sh<=0)return 100; return Math.max(0,Math.min(100,Math.round((window.scrollY||h.scrollTop)/sh*100))); }
  window.addEventListener('scroll',function(){ if(scrollScheduled)return; scrollScheduled=true; requestAnimationFrame(function(){ scrollScheduled=false; var p=scrollPct(); if(p>maxScroll)maxScroll=p; }); },{passive:true});

  function activeView(){ var a=document.querySelector('.page.active'); return a?a.id.replace(/^page-/,''):null; }
  function init(){
    curView=(SURFACE==='site')?activeView():null;
    push({type:'pageview',spa_view:curView,ref:document.referrer||'',utm:utm(),lang:navigator.language||'',tz:(window.Intl&&Intl.DateTimeFormat)?Intl.DateTimeFormat().resolvedOptions().timeZone:'',sw:screen.width,sh:screen.height,vw:innerWidth,vh:innerHeight});
    try{ var nav=performance.getEntriesByType&&performance.getEntriesByType('navigation')[0]; if(nav)push({type:'perf',perf:{load_ms:Math.round(nav.loadEventEnd||nav.duration||0),ttfb_ms:Math.round(nav.responseStart||0),dom_ms:Math.round(nav.domContentLoadedEventEnd||0)}}); }catch(_){}
  }

  if(SURFACE==='site'&&typeof window.go==='function'){
    var _go=window.go;
    window.go=function(id){ emitEngage(); emitScroll(); viewEngagedBase=engagedMs; maxScroll=0; lastScrollEmit=-1; curView=id; push({type:'virtual_pageview',spa_view:id}); return _go.apply(this,arguments); };
  }

  document.addEventListener('click',function(e){
    var el=e.target&&e.target.closest?e.target.closest('a,button,[data-go],[role="button"],input[type=submit],.card,.uc'):null;
    if(!el)return;
    var tag=el.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT'||el.isContentEditable)return; // never read user-entered text
    var raw=el.getAttribute('aria-label')||el.getAttribute('data-go')||'';
    if(!raw&&(tag==='A'||tag==='BUTTON'||el.getAttribute('role')==='button'))raw=el.textContent||'';
    var text=raw.trim().replace(/\s+/g,' ').slice(0,120);
    push({type:'click',x:e.pageX|0,y:e.pageY|0,vw:innerWidth,vh:innerHeight,el:{tag:tag.toLowerCase(),id:el.id||'',cls:(el.className&&el.className.toString)?el.className.toString().slice(0,160):'',text:text,datago:el.getAttribute('data-go')||'',href:el.getAttribute('href')||''}});
  },true);
  document.addEventListener('click',function(e){ if(e.target&&e.target.closest&&e.target.closest('#contactSubmit'))push({type:'form_submit',form_id:'contact'}); },true);

  if(SURFACE==='splash'){
    var form=document.getElementById('credForm');
    if(form)form.addEventListener('submit',function(){ push({type:'login_attempt',outcome:'attempt'}); flush(); },true);
    var err=document.getElementById('err');
    if(err&&window.MutationObserver)new MutationObserver(function(){ if(err.classList.contains('show')&&err.textContent){ push({type:'login_attempt',outcome:'fail'}); flush(); } }).observe(err,{attributes:true,childList:true,subtree:true});
  }

  document.addEventListener('visibilitychange',function(){ if(document.hidden){ accrue(); visible=false; emitEngage(); emitScroll(); flush(); } else { visible=true; lastResume=Date.now(); } });
  window.addEventListener('pagehide',function(){ accrue(); emitEngage(); emitScroll(); push({type:'exit'}); flush(); });
  setInterval(function(){ accrue(); flush(); },15000);

  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init); else init();
})();
</script>
</body>
</html>
